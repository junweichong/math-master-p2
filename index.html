<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Background Elements -->
        <div class="circles">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>

        <!-- Menu Screen -->
        <div id="screen-menu" class="screen active">

            <!-- Tablet Layout Grid -->
            <div class="menu-layout">

                <!-- Left: Mode Selection -->
                <div class="menu-section section-left">
                    <div class="level-header">
                        <div class="level-nav">
                            <button id="level-prev" class="btn-icon">&lt;</button>
                            <h2 id="level-title" class="section-title">Plus and Minus</h2>
                            <button id="level-next" class="btn-icon">&gt;</button>
                        </div>
                    </div>

                    <div id="group-number-sense" class="level-group active">
                        <div class="button-row mode-row">
                            <button class="btn btn-mode" data-mode="subitizing">Subitizing</button>
                            <button class="btn btn-mode" data-mode="placerace">Place Race</button>
                            <button class="btn btn-mode" data-mode="patterns">Number Patterns</button>
                        </div>
                    </div>

                    <div id="group-plus-minus" class="level-group">
                        <div class="button-row mode-row">
                            <button class="btn btn-mode" data-mode="addition10">Addition<br>(10)</button>
                            <button class="btn btn-mode" data-mode="subtraction10">Subtraction<br>(10)</button>
                            <button class="btn btn-mode" data-mode="addition">Addition<br>(20)</button>
                            <button class="btn btn-mode" data-mode="subtraction">Subtraction<br>(20)</button>
                            <button class="btn btn-mode" data-mode="mixed">Mixed (+-)</button>
                        </div>
                    </div>
                </div>

                <!-- Center: Player & Start -->
                <div class="menu-section section-center">
                    <!-- Mode Toggle -->
                    <div class="toggle-container">
                        <div class="toggle-group">
                            <button class="btn-toggle btn-toggle-practice">Practice</button>
                            <button class="btn-toggle btn-toggle-challenge active">Challenge</button>
                        </div>
                        <p class="toggle-blurb">Mistakes end the game. Aim for high scores!</p>
                    </div>

                    <div class="game-logo">Math Master</div>

                    <div class="input-group">
                        <label>Player Name & Class</label>
                        <div class="input-row">
                            <input type="text" id="player-name" placeholder="Enter Name" maxlength="15"
                                autocomplete="off">
                            <select id="player-class" class="dropdown">
                                <option value="2A">2A</option>
                                <option value="2C">2C</option>
                                <option value="2D">2D</option>
                                <option value="2E">2E</option>
                                <option value="2J">2J</option>
                                <option value="2O">2O</option>
                                <option value="2P">2P</option>
                                <option value="2R">2R</option>
                                <option value="2S">2S</option>
                            </select>
                        </div>
                    </div>



                    <button id="btn-start" class="btn btn-primary btn-large">Start Game</button>
                </div>

                <!-- Right: High Scores -->
                <div class="menu-section section-right">
                    <div class="score-header">
                        <div class="score-nav">
                            <button id="score-prev" class="btn-icon">&lt;</button>
                            <h3 id="score-title">High Scores</h3>
                            <button id="score-next" class="btn-icon">&gt;</button>
                        </div>
                    </div>
                    <ul id="score-list">
                        <!-- Scores populated by JS -->
                    </ul>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="screen-game" class="screen">

            <div class="game-header">
                <div class="player-info">
                    <span id="game-player-name">Player: Name</span>
                    <span id="game-score">Score: 0</span>
                </div>
                <div id="game-timer" class="timer">Time: 02:00</div>
            </div>

            <div class="question-container">
                <div class="question-display">
                    <div id="num1-container" class="number-display"></div>
                    <div id="operator">+</div>
                    <div id="num2-container" class="number-display"></div>
                    <div id="question-text-display" class="question-text"></div>
                </div>

                <form id="game-form" class="answer-box-wrapper">
                    <input type="tel" id="game-input" class="answer-box" placeholder="?" maxlength="3"
                        autocomplete="off">
                </form>
            </div>

            <button id="btn-quit" class="btn btn-secondary">Quit</button>
        </div>

        <!-- Game Over Screen -->
        <div id="screen-gameover" class="screen">
            <h1 class="title">Game Over!</h1>
            <div class="result-card">
                <p class="result-player" id="result-player">Good job, Player!</p>
                <div class="result-score">
                    <span>Score</span>
                    <span id="final-score">0</span>
                </div>
            </div>
            <button id="btn-home" class="btn btn-primary btn-large">Home</button>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="sfx-correct" src="sounds/correct.wav" preload="auto"></audio>
    <audio id="sfx-wrong" src="sounds/wrong.wav" preload="auto"></audio>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    </script>

    <script type="module" src="script.js"></script>
</body>

</html>
