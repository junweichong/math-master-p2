<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Master - We've Moved!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e88e5;
            /* Darker blue as requested */
            --primary-gradient: linear-gradient(135deg, #1e88e5 0%, #4facfe 100%);
            --bg-color: #e3f2fd;
            /* More blue background */
            --text-color: #2d3436;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --font-family: 'Comic Neue', cursive;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Circles Animation */
        .circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: var(--primary-gradient);
            top: -100px;
            left: -100px;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            max-width: 500px;
            width: 90%;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            color: #636e72;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: var(--primary-gradient);
            color: white;
            padding: 1.2rem 2.5rem;
            border-radius: 1.2rem;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(30, 136, 229, 0.3);
            transform: translateY(0);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(30, 136, 229, 0.4);
        }

        .btn:active {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    <div class="container">
        <h1>We've Moved!</h1>
        <p>Please access Math Master at the new link. </p>
        <p>The new link is: <a href="https://math-master-p2.vercel.app/">https://math-master-p2.vercel.app/</a></p>
        <p>This page will be removed in the future. </p>
        <a href="https://math-master-p2.vercel.app/" class="btn">Go to Math Master</a>
    </div>
</body>

</html>
